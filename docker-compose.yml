version: '3.8'

services:
  postgres:
    image: postgres:18-alpine
    container_name: nac_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    networks:
      - nac_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: nac_redis
    restart: unless-stopped
    volumes:
      - redisdata:/data
    networks:
      - nac_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: nac_api
    restart: unless-stopped
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8000:8000"
    networks:
      - nac_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/users"]
      interval: 10s
      timeout: 5s
      retries: 5

  freeradius:
    image: freeradius/freeradius-server:latest-3.2
    container_name: nac_freeradius
    restart: unless-stopped
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
    volumes:
      - ./freeradius/raddb:/opt/raddb
      - ./freeradius/rest:/etc/raddb/mods-enabled/rest
      - ./freeradius/default:/etc/raddb/sites-enabled/default
    environment:
      API_URL: http://api:8000
    networks:
      - nac_network
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "radclient", "-x", "localhost:1812", "status", "testing123"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  nac_network:
    driver: bridge

volumes:
  pgdata:
  redisdata: