name: Convert README to PDF

on:
  push:
    branches:
      - main
    paths:
      - 'README.md'

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    permissions:
      contents: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Loglardaki uyarıyı gidermek için Node sürümünü 24'e güncelledik
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install md-to-pdf
        run: npm install -g md-to-pdf

      # Chrome çökmesini engellemek için .mdtopdfrc yapılandırma dosyası oluşturup Sandbox'ı kapatıyoruz
      - name: Generate PDF
        run: |
          echo '{"launch_options": {"args": ["--no-sandbox", "--disable-setuid-sandbox"]}}' > .mdtopdfrc
          md-to-pdf README.md

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: update README.pdf"
          file_pattern: 'README.pdf'
